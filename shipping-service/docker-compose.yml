version: "3.9"

services:

  postgres:
    image: postgres:16
    container_name: shipping-postgres
    restart: always
    environment:
      POSTGRES_DB: shipping_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: shipping-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  shipping-service:
    build: .
    container_name: shipping-service
    restart: always
    depends_on:
      - postgres
      - rabbitmq
    ports:
      - "3003:3003"
    environment:
      PORT: 3003

      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: shipping_db
      DB_USER: postgres
      DB_PASSWORD: 12345678

      RABBITMQ_URL: amqp://rabbitmq

volumes:
  postgres_data: